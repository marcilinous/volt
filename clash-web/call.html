<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ape Date — Call</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg: #0E0C1A;
    --surface: #1A1A2E;
    --pink: #E8407A;
    --white: #FFFFFF;
    --muted: #6B7280;
    --green: #34D399;
    --red: #EF4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); height: 100vh; overflow: hidden; }

  /* ── VIDEO ── */
  #remoteVideo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; background: var(--bg); }
  #localVideo {
    position: absolute; top: 60px; right: 16px; width: 100px; height: 140px;
    border-radius: 16px; object-fit: cover; border: 2px solid var(--surface);
    z-index: 10; transform: scaleX(-1);
  }
  .hide { display: none !important; }

  /* ── AUDIO PLACEHOLDER ── */
  #audioView {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 5;
  }
  .avatar-ring {
    width: 120px; height: 120px; border-radius: 60px; background: var(--surface);
    display: flex; align-items: center; justify-content: center; font-size: 56px; margin-bottom: 20px;
  }
  .avatar-ring.pulse { animation: ring-pulse 1.5s ease-in-out infinite; }
  @keyframes ring-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(232,64,122,0.35); }
    50% { box-shadow: 0 0 0 24px rgba(232,64,122,0); }
  }
  #peerName { font-size: 24px; font-weight: 700; }
  #status { color: var(--muted); font-size: 14px; margin-top: 4px; letter-spacing: 0.3px; }
  #timer { color: var(--muted); font-size: 14px; margin-top: 8px; display: none; }

  /* ── CONTROLS ── */
  #controls {
    position: absolute; bottom: 44px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 20px; z-index: 20;
  }
  .cbtn {
    width: 52px; height: 52px; border-radius: 26px; border: none;
    background: var(--surface); color: var(--white); font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
  }
  .cbtn:active { transform: scale(0.92); }
  .cbtn.on { background: var(--pink); }
  #hangupBtn {
    width: 60px; height: 60px; border-radius: 30px; background: var(--red);
    border: none; color: var(--white); font-size: 22px; cursor: pointer;
  }

  /* ── ENDED SCREEN ── */
  #ended {
    position: fixed; inset: 0; background: var(--bg); z-index: 50;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  #ended.show { display: flex; }
  .ended-btn {
    margin-top: 16px; padding: 12px 32px; border-radius: 24px; border: none;
    background: var(--surface); color: var(--white); font-size: 14px; cursor: pointer;
  }
  .report-link {
    margin-top: 8px; color: var(--red); font-size: 12px; background: none;
    border: none; cursor: pointer; text-decoration: underline;
  }
</style>
</head>
<body>

<video id="remoteVideo" autoplay playsinline></video>
<video id="localVideo" autoplay playsinline muted></video>

<div id="audioView">
  <div class="avatar-ring pulse" id="ring">🦍</div>
  <div id="peerName">...</div>
  <div id="status">Connecting...</div>
  <div id="timer">00:00</div>
</div>

<div id="controls">
  <button class="cbtn" id="muteBtn" onclick="toggleMute()">🎤</button>
  <button class="cbtn hide" id="camBtn" onclick="toggleCam()">📷</button>
  <button class="cbtn hide" id="flipBtn" onclick="flipCam()">🔄</button>
  <button id="hangupBtn" onclick="doHangup()">📵</button>
</div>

<div id="ended">
  <div style="font-size:48px">🦍</div>
  <div style="font-size:18px;font-weight:600">Call Ended</div>
  <div id="endDuration" style="color:var(--muted);font-size:14px"></div>
  <button class="ended-btn" onclick="backToChat()">Back to Chat</button>
  <button class="report-link" onclick="reportCall()">Report this call</button>
</div>

<script>
// ── URL PARAMS ──
const P = new URLSearchParams(location.search);
const CALL_ID    = P.get('call_id');
const CALL_TYPE  = P.get('type') || 'audio';
const ROLE       = P.get('role');  // 'caller' or 'receiver'
const CONV_ID    = P.get('conv_id');
const MY_ID      = P.get('my_id');
const PEER_NAME  = decodeURIComponent(P.get('peer_name') || 'Someone');

const IS_CALLER  = ROLE === 'caller';
const IS_VIDEO   = CALL_TYPE === 'video';

// ── DOM ──
const $remote = document.getElementById('remoteVideo');
const $local  = document.getElementById('localVideo');
const $audio  = document.getElementById('audioView');
const $name   = document.getElementById('peerName');
const $status = document.getElementById('status');
const $timer  = document.getElementById('timer');
const $ring   = document.getElementById('ring');
const $mute   = document.getElementById('muteBtn');
const $cam    = document.getElementById('camBtn');
const $flip   = document.getElementById('flipBtn');

$name.textContent = PEER_NAME;
if (IS_VIDEO) { $cam.classList.remove('hide'); $flip.classList.remove('hide'); $audio.style.display = 'none'; }
else { $local.classList.add('hide'); $remote.style.display = 'none'; }

// ── STATE ──
let pc = null, localStream = null, isMuted = false, isCamOff = !IS_VIDEO;
let callStart = null, timerInt = null, pollInt = null, lastSignalId = 0;
let iceQueue = [];

const ICE = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
]};

// ── API HELPERS (zero keys) ──
async function api(endpoint, body) {
  const r = await fetch(`/api/${endpoint}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

async function sendSignal(type, payload) {
  return api('call-signal', { call_id: CALL_ID, sender: ROLE, signal_type: type, payload });
}

async function pollSignals() {
  try {
    const r = await fetch(`/api/call-signal?call_id=${CALL_ID}&role=${ROLE}&after=${lastSignalId}`);
    const { signals } = await r.json();
    if (!signals) return;

    for (const sig of signals) {
      lastSignalId = sig.id;
      if (sig.signal_type === 'offer' && !IS_CALLER) await handleOffer(sig.payload);
      if (sig.signal_type === 'answer' && IS_CALLER) await handleAnswer(sig.payload);
      if (sig.signal_type === 'ice') await handleIce(sig.payload);
      if (sig.signal_type === 'hangup') onEnded();
    }
  } catch (e) { console.error('poll error', e); }
}

// ── WEBRTC ──
async function init() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: IS_VIDEO ? { facingMode: 'user', width: { ideal: 720 } } : false,
    });
    $local.srcObject = localStream;

    pc = new RTCPeerConnection(ICE);
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.ontrack = (e) => {
      $remote.srcObject = e.streams[0];
      if (!IS_VIDEO) { const a = new Audio(); a.srcObject = e.streams[0]; a.play(); }
    };

    pc.onicecandidate = (e) => {
      if (e.candidate) sendSignal('ice', e.candidate.toJSON());
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'connected') onConnected();
      if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') onEnded();
    };

    // Start polling for signals (every 500ms)
    pollInt = setInterval(pollSignals, 500);

    if (IS_CALLER) {
      $status.textContent = 'Ringing...';
      // Delay offer slightly so receiver's poll starts first
      setTimeout(async () => {
        const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: IS_VIDEO });
        await pc.setLocalDescription(offer);
        sendSignal('offer', offer);
      }, 1500);
    } else {
      $status.textContent = 'Connecting...';
      // Mark call as answered
      api('call-action', { action: 'answer', call_id: CALL_ID });
    }

  } catch (err) {
    console.error(err);
    $status.textContent = 'Camera/mic permission denied';
  }
}

async function handleOffer(sdp) {
  if (!pc) return;
  await pc.setRemoteDescription(new RTCSessionDescription(sdp));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  sendSignal('answer', answer);
  flushIce();
}

async function handleAnswer(sdp) {
  if (!pc) return;
  await pc.setRemoteDescription(new RTCSessionDescription(sdp));
  flushIce();
}

async function handleIce(candidate) {
  if (pc && pc.remoteDescription) {
    await pc.addIceCandidate(new RTCIceCandidate(candidate));
  } else {
    iceQueue.push(candidate);
  }
}

function flushIce() {
  iceQueue.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)));
  iceQueue = [];
}

// ── CALL STATES ──
function onConnected() {
  $status.textContent = 'Connected';
  $ring.classList.remove('pulse');
  callStart = Date.now();
  $timer.style.display = 'block';
  timerInt = setInterval(() => {
    const s = Math.floor((Date.now() - callStart) / 1000);
    $timer.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }, 1000);
  // Slow down polling once connected (just for hangup detection)
  clearInterval(pollInt);
  pollInt = setInterval(pollSignals, 2000);
}

function onEnded() {
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (pc) { pc.close(); pc = null; }
  if (pollInt) clearInterval(pollInt);
  if (timerInt) clearInterval(timerInt);
  document.getElementById('endDuration').textContent = callStart ? $timer.textContent : 'Not connected';
  document.getElementById('ended').classList.add('show');
}

// ── CONTROLS ──
function toggleMute() {
  if (!localStream) return;
  const a = localStream.getAudioTracks()[0];
  if (a) { a.enabled = !a.enabled; isMuted = !a.enabled; $mute.textContent = isMuted ? '🔇' : '🎤'; $mute.classList.toggle('on', isMuted); }
}

function toggleCam() {
  if (!localStream) return;
  const v = localStream.getVideoTracks()[0];
  if (v) { v.enabled = !v.enabled; isCamOff = !v.enabled; $cam.classList.toggle('on', isCamOff); $local.classList.toggle('hide', isCamOff); }
}

async function flipCam() {
  if (!localStream || !IS_VIDEO) return;
  const old = localStream.getVideoTracks()[0];
  const facing = old.getSettings().facingMode === 'user' ? 'environment' : 'user';
  old.stop();
  const ns = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing, width: { ideal: 720 } } });
  const nt = ns.getVideoTracks()[0];
  const sender = pc.getSenders().find(s => s.track?.kind === 'video');
  if (sender) await sender.replaceTrack(nt);
  localStream.removeTrack(old); localStream.addTrack(nt);
  $local.srcObject = localStream;
}

async function doHangup() {
  await api('call-action', { action: 'hangup', call_id: CALL_ID, user_id: MY_ID });
  onEnded();
}

function backToChat() {
  window.location.href = CONV_ID ? `/chat.html?conv_id=${CONV_ID}` : '/';
}

async function reportCall() {
  const r = prompt('What happened? (optional)');
  await api('call-action', { action: 'report', call_id: CALL_ID, reason: r || 'Reported' });
  alert('Reported. Thanks for keeping Ape Date safe. 🦍');
  backToChat();
}

// ── START ──
init();
</script>
</body>
</html>
